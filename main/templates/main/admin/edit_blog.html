{% extends 'main/admin/base_admin.html' %}
{% block content %}
    <h1>{% if blog.id %}Edit Blog{% else %}Add Blog{% endif %}</h1>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label>Title:</label>
            <input type="text" name="title" value="{{ blog.title|default:'' }}" required>
            
            <label>Blog Thumbnail Image (Cloudinary Upload):</label>
            {% if blog.image_url %}
            <div style="margin-bottom: 10px;">
                <img src="{{ blog.image_url }}" alt="Current Image" style="max-height: 100px; border-radius: 4px;">
                <p style="font-size: 14px; margin: 5px 0;">Current Image. Upload a new one to replace.</p>
            </div>
            {% endif %}
            <input type="file" name="image" accept="image/*">
            <br><br>

            <label>Content:</label>
            <textarea name="content" rows="15" required>{{ blog.content|default:'' }}</textarea>
            
            <label>
                <input type="checkbox" name="is_published" style="width: auto;" {% if blog.is_published %}checked{% endif %}>
                Published
            </label>
            <br><br>
            
            <button type="submit">Save Blog</button>
            <a href="{% url 'admin_blogs' %}" style="margin-left: 10px;">Cancel</a>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <script>
      tinymce.init({
        selector: 'textarea[name="content"]',
        plugins: 'image link media table code lists',
        toolbar: 'undo redo | blocks | bold italic | alignleft aligncenter alignright | bullist numlist | link image | code',
        images_upload_url: '{% url "admin_upload_image" %}',
        automatic_uploads: true,
        height: 600,
        content_style: 'body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; line-height: 1.6; }'
      });
    </script>
{% endblock %}
