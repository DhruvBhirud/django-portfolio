{% extends 'main/admin/base_admin.html' %}
{% load static %}
{% block content %}
    <h1>{% if blog.id %}Edit Blog{% else %}Add Blog{% endif %}</h1>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label>Title:</label>
            <input type="text" name="title" value="{{ blog.title|default:'' }}" required>
            
            <label>Blog Thumbnail Image (Cloudinary Upload):</label>
            {% if blog.image_url %}
            <div style="margin-bottom: 10px;">
                <img src="{{ blog.image_url }}" alt="Current Image" style="max-height: 100px; border-radius: 4px;">
                <p style="font-size: 14px; margin: 5px 0;">Current Image. Upload a new one to replace.</p>
            </div>
            {% endif %}
            <input type="file" name="image" accept="image/*">
            <br><br>

            <label>Tags (comma separated):</label>
            <input type="text" name="tags" value="{{ blog.tags|default:'' }}" placeholder="e.g. Django, Python, Web Dev">
            <br><br>

            <label>Content:</label>
            <textarea name="content" class="rich-text-editor" data-upload-url="{% url 'admin_upload_image' %}" rows="15">{{ blog.content|default:'' }}</textarea>
            
            <label>
                <input type="checkbox" name="is_published" style="width: auto;" {% if blog.is_published %}checked{% endif %}>
                Published
            </label>
            <br><br>
            
            <button type="submit" class="btn">Save Blog</button>
            <a href="{% url 'admin_blogs' %}" class="btn btn-secondary" style="margin-left: 10px;">Cancel</a>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <script src="{% static 'js/admin_tinymce.js' %}"></script>
{% endblock %}
