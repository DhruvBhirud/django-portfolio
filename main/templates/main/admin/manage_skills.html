{% extends 'main/admin/base_admin.html' %}
{% block content %}
    <h1>Manage Skills</h1>
    
    <div class="card">
        <h3>Add New Skill</h3>
        <form method="post" action="{% url 'admin_skills' %}" style="display: flex; gap: 10px;">
            {% csrf_token %}
            <input type="text" name="name" placeholder="E.g., Python, React, MongoDB" required style="margin-bottom: 0;">
            <button type="submit">Add Skill</button>
        </form>
    </div>

    <div class="card">
        <h3>Current Skills</h3>
        <table>
            <thead>
                <tr>
                    <th>Skill Name</th>
                    <th style="width: 100px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for skill in skills %}
                <tr>
                    <td>{{ skill.name }}</td>
                    <td>
                        <form method="post" action="{% url 'admin_skill_delete' skill.id %}" style="margin: 0;">
                            {% csrf_token %}
                            <button type="submit" class="btn-danger" onclick="return confirm('Are you sure you want to delete this skill?')">Delete</button>
                        </form>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">No skills currently added.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
