{% extends 'main/admin/base_admin.html' %}
{% block content %}
    <h1>Edit Profile</h1>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label>Name:</label>
            <input type="text" name="name" value="{{ profile.name|default:'' }}" required>
            
            <label>Title:</label>
            <input type="text" name="title" value="{{ profile.title|default:'' }}" required>
            
            <label>Bio (Short description for hero section):</label>
            <textarea name="bio" rows="4" required>{{ profile.bio|default:'' }}</textarea>
            
            <label>Email:</label>
            <input type="email" name="email" value="{{ profile.email|default:'' }}" required>
            
            <label>GitHub:</label>
            <input type="url" name="github" value="{{ profile.github|default:'' }}">
            
            <label>LinkedIn:</label>
            <input type="url" name="linkedin" value="{{ profile.linkedin|default:'' }}">
            
            <label>Resume (PDF format):</label>
            {% if profile.resume_url %}
            <p style="margin: 0 0 10px 0; font-size: 14px;">Current Resume: <a href="{{ profile.resume_url }}" target="_blank">View PDF</a></p>
            {% endif %}
            <input type="file" name="resume" accept=".pdf">
            
            <br><br>
            <button type="submit">Save Profile</button>
        </form>
    </div>
{% endblock %}
