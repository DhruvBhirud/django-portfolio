{% extends 'main/admin/base_admin.html' %}
{% block content %}
    <h1>Edit Profile</h1>
    <div class="card">
        <form method="post">
            {% csrf_token %}
            <label>Name:</label>
            <input type="text" name="name" value="{{ profile.name|default:'' }}" required>
            
            <label>Title:</label>
            <input type="text" name="title" value="{{ profile.title|default:'' }}" required>
            
            <label>Bio:</label>
            <textarea name="bio" rows="4">{{ profile.bio|default:'' }}</textarea>
            
            <label>Email:</label>
            <input type="email" name="email" value="{{ profile.email|default:'' }}">
            
            <label>GitHub URL:</label>
            <input type="url" name="github" value="{{ profile.github|default:'' }}">
            
            <label>LinkedIn URL:</label>
            <input type="url" name="linkedin" value="{{ profile.linkedin|default:'' }}">
            
            <button type="submit">Save Profile</button>
        </form>
    </div>
{% endblock %}
