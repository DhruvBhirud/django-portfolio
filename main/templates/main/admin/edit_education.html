{% extends 'main/admin/base_admin.html' %}
{% block content %}
<h2>{% if education.id %}Edit Education{% else %}Add Education{% endif %}</h2>

<div class="card" style="max-width: 800px;">
    <form method="POST">
        {% csrf_token %}
        
        <label>Institution Name</label>
        <input type="text" name="institution" value="{{ education.institution }}" required>
        
        <label>Institution URL (Optional)</label>
        <input type="url" name="institution_url" value="{{ education.institution_url|default:'' }}">
        
        <label>Degree / Certificate / Level</label>
        <input type="text" name="degree" value="{{ education.degree }}" required>
        
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Start Date (e.g., Aug 2018)</label>
                <input type="text" name="start_date" value="{{ education.start_date }}" required>
            </div>
            <div style="flex: 1;">
                <label>End Date (e.g., May 2022)</label>
                <input type="text" name="end_date" id="end_date" value="{{ education.end_date|default:'' }}">
            </div>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: inline-flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" name="is_current" id="is_current" style="width: auto; margin: 0;" {% if education.is_current %}checked{% endif %}>
                Currently Studying
            </label>
        </div>
        
        <label>Description (Optional)</label>
        <textarea name="description" rows="4">{{ education.description|default:'' }}</textarea>
        
        <div style="margin-top: 20px;">
            <button type="submit" class="btn"><i class="fas fa-save"></i> Save Education</button>
            <a href="{% url 'admin_education' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const isCurrentCheckbox = document.getElementById('is_current');
        const endDateInput = document.getElementById('end_date');
        
        function toggleEndDate() {
            if (isCurrentCheckbox.checked) {
                endDateInput.disabled = true;
                endDateInput.parentElement.style.opacity = '0.5';
            } else {
                endDateInput.disabled = false;
                endDateInput.parentElement.style.opacity = '1';
            }
        }
        
        isCurrentCheckbox.addEventListener('change', toggleEndDate);
        toggleEndDate(); // run on load
    });
</script>
{% endblock %}
