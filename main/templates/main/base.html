<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon-light.png' %}" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="{% static 'images/favicon-dark.png' %}" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <script>
        // Check local storage for theme preference to prevent flash
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">Dhruv Bhirud</a>
        <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-links').classList.toggle('active')">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links">
            <a href="/#about" onclick="document.querySelector('.nav-links').classList.remove('active')">About</a>
            <a href="/#projects" onclick="document.querySelector('.nav-links').classList.remove('active')">Projects</a>
            <a href="/#skills" onclick="document.querySelector('.nav-links').classList.remove('active')">Skills</a>
            <a href="{% url 'blog_index' %}" onclick="document.querySelector('.nav-links').classList.remove('active')">Blogs</a>
            <a href="/#contact" onclick="document.querySelector('.nav-links').classList.remove('active')">Contact</a>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>
    <ul class="notifications"></ul>
    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            {% for message in messages %}
                showToast("{{ message.tags }}", "{{ message|escapejs }}");
            {% endfor %}
        });
    </script>
    {% endif %}
    {% block content %}{% endblock %}
    <footer>
        <p>Built with ☕ by <a href="https://github.com/DhruvBhirud/">Dhruv Bhirud</a></p>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('light-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }
        
        // Initial icon update
        updateIcon();
        
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-mode');
            
            if (document.documentElement.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
            updateIcon();
        });

        // Toast logic
        const notifications = document.querySelector(".notifications");

        const toastDetails = {
            timer: 5000,
            success: {
                icon: 'fa-circle-check',
            },
            error: {
                icon: 'fa-circle-xmark',
            },
            warning: {
                icon: 'fa-triangle-exclamation',
            },
            info: {
                icon: 'fa-circle-info',
            }
        }

        const removeToast = (toast) => {
            toast.classList.add("hide");
            if(toast.timeoutId) clearTimeout(toast.timeoutId);
            setTimeout(() => toast.remove(), 500);
        }

        const showToast = (id, message) => {
            // Map Django tags to toast types
            const type = id === 'debug' ? 'info' : (id || 'info');
            const { icon } = toastDetails[type] || toastDetails.info;
            const toast = document.createElement("li");
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div class="column">
                                 <i class="fa-solid ${icon}"></i>
                                 <span>${message}</span>
                              </div>
                              <i class="fa-solid fa-xmark" onclick="removeToast(this.parentElement)"></i>`;
            notifications.appendChild(toast);
            toast.timeoutId = setTimeout(() => removeToast(toast), toastDetails.timer);
        }
    </script>
</body>
</html>
