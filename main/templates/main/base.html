<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon-light.png' %}" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="{% static 'images/favicon-dark.png' %}" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <script>
        // Check local storage for theme preference to prevent flash
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">Dhruv Bhirud</a>
        <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-links').classList.toggle('active')">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links">
            <a href="/#about" onclick="document.querySelector('.nav-links').classList.remove('active')">About</a>
            <a href="/#projects" onclick="document.querySelector('.nav-links').classList.remove('active')">Projects</a>
            <a href="/#skills" onclick="document.querySelector('.nav-links').classList.remove('active')">Skills</a>
            <a href="{% url 'blog_index' %}" onclick="document.querySelector('.nav-links').classList.remove('active')">Blogs</a>
            <a href="/#contact" onclick="document.querySelector('.nav-links').classList.remove('active')">Contact</a>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>
    {% if messages %}
    <div class="messages" style="padding: 1rem 5%; position: relative; z-index: 100;">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}" style="padding: 1rem; border-radius: 8px; margin-bottom: 1rem; {% if message.tags == 'success' %}background: #d4edda; color: #155724;{% else %}background: #f8d7da; color: #721c24;{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
    <footer>
        <p>Built with ☕ by <a href="https://github.com/DhruvBhirud/">Dhruv Bhirud</a></p>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('light-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }
        
        // Initial icon update
        updateIcon();
        
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-mode');
            
            if (document.documentElement.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
            updateIcon();
        });
    </script>
</body>
</html>
