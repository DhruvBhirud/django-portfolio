<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon-light.png' %}" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" href="{% static 'images/favicon-dark.png' %}" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">Dhruv Bhirud</a>
        <button class="menu-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-links').classList.toggle('active')">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links">
            <a href="/#about" onclick="document.querySelector('.nav-links').classList.remove('active')">About</a>
            <a href="/#projects" onclick="document.querySelector('.nav-links').classList.remove('active')">Projects</a>
            <a href="/#skills" onclick="document.querySelector('.nav-links').classList.remove('active')">Skills</a>
            <a href="{% url 'blog_index' %}" onclick="document.querySelector('.nav-links').classList.remove('active')">Blogs</a>
            <a href="/#contact" onclick="document.querySelector('.nav-links').classList.remove('active')">Contact</a>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <footer>
        <p>Built with ☕ by <a href="https://github.com/DhruvBhirud/">Dhruv Bhirud</a></p>
    </footer>
</body>
</html>
