{% extends 'main/base.html' %}
{% block title %}{{ blog.title }} - Portfolio{% endblock %}

{% block content %}
<section class="section detail-section">
    <div class="detail-container">
        <a href="{% url 'blog_index' %}" class="back-link">← Back to Blogs</a>
        <h1 class="detail-title">{{ blog.title }}</h1>
        <div class="detail-tags">
            <span class="project-tag">{{ blog.created_at|date:"M d, Y" }}</span>
        </div>
        
        {% if blog.image_url %}
        <div style="margin-top: 20px;">
            <img src="{{ blog.image_url }}" alt="{{ blog.title }}" style="width: 100%; max-height: 450px; object-fit: cover; border-radius: 8px;">
        </div>
        {% endif %}
        
        <div class="detail-content" style="margin-top: 30px; font-size: 1.1rem; line-height: 1.8;">
            {{ blog.content|safe }}
        </div>
    </div>
</section>
{% endblock %}
